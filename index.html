<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PNOC037 Dosing Calculator</title>

<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #0a1628;
    --navy-mid: #122040;
    --navy-light: #1e3460;
    --teal: #00b4c8;
    --teal-dim: #007d8c;
    --white: #f5f9ff;
    --gray-100: #e8eef8;
    --gray-200: #c8d4e8;
    --gray-400: #8899bb;
    --gray-600: #556080;
    --red: #e85555;
    --amber: #f0a020;
    --green: #22c878;
    --cycle1: #2563eb;
    --cycle2: #7c3aed;
    --cycle3: #0891b2;
    --cycle4: #059669;
    --cycle1-bg: #1e3a8a18;
    --cycle2-bg: #4c1d9518;
    --cycle3-bg: #0e749118;
    --cycle4-bg: #05503618;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'IBM Plex Sans', sans-serif;
    background: var(--navy);
    color: var(--white);
    min-height: 100vh;
    font-size: 14px;
    line-height: 1.5;
  }
  .header {
    background: linear-gradient(135deg, var(--navy) 0%, var(--navy-mid) 100%);
    border-bottom: 2px solid var(--teal);
    padding: 20px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
  }
  .header-left { display: flex; align-items: center; gap: 16px; }
  .trial-badge {
    background: var(--teal);
    color: var(--navy);
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 600;
    font-size: 13px;
    padding: 5px 12px;
    border-radius: 4px;
    letter-spacing: 0.05em;
  }
  .header h1 {
    font-size: 20px;
    font-weight: 600;
    color: var(--white);
    letter-spacing: -0.02em;
  }
  .header-sub {
    font-size: 12px;
    color: var(--gray-400);
    font-weight: 300;
  }
  .main { max-width: 1400px; margin: 0 auto; padding: 28px 24px 60px; }
  .input-section {
    background: var(--navy-mid);
    border: 1px solid var(--navy-light);
    border-radius: 12px;
    padding: 28px;
    margin-bottom: 28px;
  }
  .input-section h2 {
    font-size: 13px;
    font-weight: 600;
    color: var(--teal);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 20px;
    font-family: 'IBM Plex Mono', monospace;
  }
  .input-grid {
    display: grid;
    grid-template-columns: 1fr 1fr auto;
    gap: 16px;
    align-items: end;
    flex-wrap: wrap;
  }
  @media (max-width: 600px) { .input-grid { grid-template-columns: 1fr; } }
  .field label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    color: var(--gray-400);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .field input {
    width: 100%;
    background: var(--navy);
    border: 1.5px solid var(--navy-light);
    border-radius: 8px;
    color: var(--white);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 15px;
    padding: 11px 14px;
    outline: none;
    transition: border-color 0.2s;
  }
  .field input:focus { border-color: var(--teal); }
  .field input::placeholder { color: var(--gray-600); }
  .btn-calc {
    background: var(--teal);
    color: var(--navy);
    border: none;
    border-radius: 8px;
    font-family: 'IBM Plex Sans', sans-serif;
    font-weight: 700;
    font-size: 14px;
    padding: 12px 28px;
    cursor: pointer;
    letter-spacing: 0.02em;
    transition: background 0.15s, transform 0.1s;
    white-space: nowrap;
  }
  .btn-calc:hover { background: #00cce0; }
  .btn-calc:active { transform: scale(0.98); }
  .btn-sec {
    background: var(--navy-light);
    color: var(--gray-200);
    border: 1px solid var(--gray-600);
    border-radius: 8px;
    font-family: 'IBM Plex Sans', sans-serif;
    font-weight: 500;
    font-size: 13px;
    padding: 10px 20px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn-sec:hover { background: var(--navy-mid); }
  .results-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
    margin-bottom: 24px;
  }
  .patient-chip {
    background: var(--navy-mid);
    border: 1px solid var(--navy-light);
    border-radius: 8px;
    padding: 10px 18px;
    display: flex;
    align-items: center;
    gap: 20px;
  }
  .chip-item { display: flex; flex-direction: column; gap: 2px; }
  .chip-label { font-size: 10px; color: var(--gray-400); text-transform: uppercase; letter-spacing: 0.08em; }
  .chip-value { font-family: 'IBM Plex Mono', monospace; font-size: 15px; font-weight: 600; color: var(--teal); }
  .actions { display: flex; gap: 10px; flex-wrap: wrap; }
  .drug-section { margin-bottom: 32px; }
  .drug-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--navy-light);
  }
  .drug-name {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: -0.02em;
    color: var(--white);
  }
  .drug-meta { font-size: 12px; color: var(--gray-400); font-family: 'IBM Plex Mono', monospace; }
  .cycles-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
  }
  @media (max-width: 900px) { .cycles-grid { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 500px) { .cycles-grid { grid-template-columns: 1fr; } }
  .cycle-card {
    border-radius: 10px;
    border: 1.5px solid;
    overflow: hidden;
  }
  .cycle-card-1 { border-color: var(--cycle1); }
  .cycle-card-2 { border-color: var(--cycle2); }
  .cycle-card-3 { border-color: var(--cycle3); }
  .cycle-card-4 { border-color: var(--cycle4); }
  .cycle-header {
    padding: 10px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .cycle-header-1 { background: linear-gradient(90deg, #1e3a8a40, #1e3a8a18); }
  .cycle-header-2 { background: linear-gradient(90deg, #4c1d9540, #4c1d9518); }
  .cycle-header-3 { background: linear-gradient(90deg, #0e749140, #0e749118); }
  .cycle-header-4 { background: linear-gradient(90deg, #05503640, #05503618); }
  .cycle-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    font-family: 'IBM Plex Mono', monospace;
  }
  .cycle-label-1 { color: #93c5fd; }
  .cycle-label-2 { color: #c4b5fd; }
  .cycle-label-3 { color: #67e8f9; }
  .cycle-label-4 { color: #6ee7b7; }
  .pct-badge {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 4px;
  }
  .pct-badge-1 { background: #1e3a8a50; color: #93c5fd; }
  .pct-badge-2 { background: #4c1d9550; color: #c4b5fd; }
  .pct-badge-3 { background: #0e749150; color: #67e8f9; }
  .pct-badge-4 { background: #05503650; color: #6ee7b7; }
  .cycle-body { padding: 14px; background: var(--navy-mid); }
  .dose-row {
    display: flex;
    flex-direction: column;
    gap: 4px;
    padding: 8px 0;
    border-bottom: 1px solid var(--navy-light);
  }
  .dose-row:last-child { border-bottom: none; }
  .dose-row-label {
    font-size: 10px;
    color: var(--gray-400);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  .dose-row-value {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    font-weight: 600;
    color: var(--white);
    word-break: break-word;
  }
  .dose-row-value.warning { color: var(--amber); }
  .dose-row-value.ok { color: var(--green); }
  .flag-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: #f0a02018;
    border: 1px solid var(--amber);
    border-radius: 4px;
    padding: 3px 8px;
    font-size: 11px;
    color: var(--amber);
    font-weight: 600;
    margin-top: 4px;
  }
  .formulation-tabs {
    display: flex;
    gap: 6px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  .form-tab {
    padding: 6px 14px;
    border-radius: 6px;
    border: 1.5px solid var(--navy-light);
    background: var(--navy);
    color: var(--gray-400);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    font-family: 'IBM Plex Mono', monospace;
  }
  .form-tab.active { border-color: var(--teal); color: var(--teal); background: #00b4c812; }
  .summary-section {
    background: var(--navy-mid);
    border: 1px solid var(--navy-light);
    border-radius: 12px;
    padding: 24px;
    margin-top: 32px;
  }
  .summary-section h3 {
    font-size: 13px;
    font-weight: 600;
    color: var(--teal);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    font-family: 'IBM Plex Mono', monospace;
    margin-bottom: 16px;
  }
  .summary-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .summary-table th {
    text-align: left;
    padding: 8px 12px;
    background: var(--navy);
    color: var(--gray-400);
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 600;
  }
  .summary-table td {
    padding: 9px 12px;
    border-bottom: 1px solid var(--navy-light);
    font-family: 'IBM Plex Mono', monospace;
    color: var(--white);
    vertical-align: top;
  }
  .summary-table tr:last-child td { border-bottom: none; }
  .summary-table tr:hover td { background: #ffffff06; }
  .td-cycle-1 { color: #93c5fd; font-weight: 700; }
  .td-cycle-2 { color: #c4b5fd; font-weight: 700; }
  .td-cycle-3 { color: #67e8f9; font-weight: 700; }
  .td-cycle-4 { color: #6ee7b7; font-weight: 700; }
  .disclaimer {
    background: #f0a02010;
    border: 1px solid #f0a02040;
    border-radius: 8px;
    padding: 14px 18px;
    margin-top: 24px;
    font-size: 12px;
    color: var(--amber);
    display: flex;
    gap: 10px;
    align-items: flex-start;
  }
  .disclaimer-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }
  .empty-state {
    text-align: center;
    padding: 80px 20px;
    color: var(--gray-600);
  }
  .empty-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.3; }
  .empty-text { font-size: 16px; margin-bottom: 8px; color: var(--gray-400); }
  .empty-sub { font-size: 13px; }
  .info-note {
    background: #00b4c810;
    border: 1px solid #00b4c830;
    border-radius: 6px;
    padding: 8px 12px;
    font-size: 11px;
    color: var(--teal);
    margin-bottom: 14px;
  }
  @media print {
    body { background: white; color: black; }
    .header { background: white; border-bottom: 2px solid #0a1628; }
    .header h1, .trial-badge, .header-sub { color: black !important; }
    .btn-calc, .btn-sec, .actions { display: none; }
    .input-section { display: none; }
    .cycle-card { border-color: #333 !important; }
    .cycle-header { background: #f0f0f0 !important; }
    .cycle-body { background: white; }
    .cycle-label, .cycle-label-1, .cycle-label-2, .cycle-label-3, .cycle-label-4 { color: #333 !important; }
    .pct-badge { background: #eee !important; color: #333 !important; }
    .dose-row-label { color: #666; }
    .dose-row-value { color: #000; }
    .summary-section { background: white; border: 1px solid #ccc; }
    .summary-table th { background: #f0f0f0; color: #333; }
    .summary-table td { color: #000; }
    .td-cycle-1, .td-cycle-2, .td-cycle-3, .td-cycle-4 { color: #333 !important; }
    .drug-name { color: #000 !important; }
    .patient-chip { background: #f0f0f0; border: 1px solid #ccc; }
    .chip-label { color: #666; }
    .chip-value { color: #003366; }
    .flag-badge { background: #fff3cd; border-color: #f0a020; color: #856404; }
    .disclaimer { background: #fff3cd; border-color: #f0a020; color: #856404; }
    .main { padding: 16px; }
  }
</style>
</head>

function roundWeight(w) { return Math.round(w * 10) / 10; }

function lookupWeight(w, data, weightKey='weight') {
  const rw = roundWeight(w);
  // Find exact match or cap at >=51
  let row = data.find(r => r[weightKey]===rw || (rw>=51 && r[weightKey]===51));
  if (!row && rw > 50.9) row = data.find(r => r[weightKey]===51);
  return row;
}

function getDabLiquid(weight, pct) {
  const rw = roundWeight(weight);
  let row;
  if(rw >= 51) row = dabrafenibLiquidData.find(r=>r[0]===51 && r[1]===pct);
  else row = dabrafenibLiquidData.find(r=>r[0]===rw && r[1]===pct);
  return row || null;
}

function getDabCapsule(weight, pct) {
  const rw = roundWeight(weight);
  let row;
  if(rw >= 51) row = dabrafenibCapsuleData.find(r=>r[0]===51 && r[1]===pct);
  else row = dabrafenibCapsuleData.find(r=>r[0]===rw && r[1]===pct);
  return row || null;
}

function getTramLiquid(weight, pct) {
  const rw = roundWeight(weight);
  let row;
  if(rw >= 51) row = trametinibLiquidData.find(r=>r.weight===51 && r.pct===pct);
  else row = trametinibLiquidData.find(r=>r.weight===rw && r.pct===pct);
  return row || null;
}

function getTramCapsule(weight, pct) {
  const rw = roundWeight(weight);
  let row;
  if(rw >= 51) row = trametinibCapsuleData.find(r=>r.weight===51 && r.pct===pct);
  else row = trametinibCapsuleData.find(r=>r.weight===rw && r.pct===pct);
  return row || null;
}

function getTramCapLiq(weight, pct) {
  const rw = roundWeight(weight);
  let row;
  if(rw >= 51) row = tramCapLiqData.find(r=>r.weight===51 && r.pct===pct);
  else row = tramCapLiqData.find(r=>r.weight===rw && r.pct===pct);
  return row || null;
}

const CYCLES = [
  { label: 'Cycle 1', pct: 100, idx: 1 },
  { label: 'Cycle 2', pct: 75,  idx: 2 },
  { label: 'Cycle 3', pct: 50,  idx: 3 },
  { label: 'Cycle 4', pct: 25,  idx: 4 },
];

function flagDeviation(actual, target) {
  if (!actual || !target) return false;
  const diff = Math.abs(actual - target) / target * 100;
  return diff > 15;
}

// ---- REACT APP ----
const { useState, useCallback } = React;

function App() {
  const [patientId, setPatientId] = useState('');
  const [weight, setWeight] = useState('');
  const [results, setResults] = useState(null);
  const [dabFormTab, setDabFormTab] = useState('liquid');
  const [tramFormTab, setTramFormTab] = useState('liquid');
  const [error, setError] = useState('');

  const calculate = useCallback(() => {
    setError('');
    const w = parseFloat(weight);
    if (!patientId.trim()) { setError('Please enter a Patient ID.'); return; }
    if (isNaN(w) || w < 8 || w > 200) { setError('Please enter a valid weight (8–200 kg).'); return; }
    setResults({ patientId: patientId.trim(), weight: w });
  }, [patientId, weight]);

  const handleKeyDown = (e) => { if(e.key==='Enter') calculate(); };

  const downloadCSV = () => {
    if(!results) return;
    const { weight: w } = results;
    const lines = [`PNOC037 Dosing Calculator - Patient: ${results.patientId} - Weight: ${w} kg`,''];
    lines.push('--- DABRAFENIB (Dispersible Tablet) ---');
    lines.push('Cycle,Reduction,Dose (mg),# Tabs,Freq,Vol Diluted (mL),Vol Given (mL),Vol Wasted (mL),% Diff from Initial');
    CYCLES.forEach(c=>{
      const d=getDabLiquid(w,c.pct);
      if(d) lines.push(`${c.label},${c.pct}%,${d[2]},${d[3]},${d[4]},${d[5]},${d[6]},${d[7]},${d[8]}%`);
    });
    lines.push('');
    lines.push('--- DABRAFENIB (Capsule) ---');
    lines.push('Cycle,Reduction,Dose Description,Freq,Weekly Dose (mg),% Diff');
    CYCLES.forEach(c=>{
      const d=getDabCapsule(w,c.pct);
      if(d) lines.push(`${c.label},${c.pct}%,"${d[3]}",${d[4]},${d[5]},${d[6]}%`);
    });
    lines.push('');
    lines.push('--- TRAMETINIB (Liquid) ---');
    lines.push('Cycle,Reduction,Dose (mg),Volume (mL),Freq');
    CYCLES.forEach(c=>{
      const d=getTramLiquid(w,c.pct);
      if(d) lines.push(`${c.label},${c.pct}%,${d.doseMg},${d.doseMl},${d.freq}`);
    });
    lines.push('');
    lines.push('--- TRAMETINIB (Capsule) ---');
    lines.push('Cycle,Reduction,Dose Description,Weekly Dose (mg),% Diff');
    CYCLES.forEach(c=>{
      const d=getTramCapsule(w,c.pct);
      if(d) lines.push(`${c.label},${c.pct}%,"${d.doseDesc}",${d.weeklyDoseMg},${d.pctDiff}%`);
    });
    lines.push('');
    lines.push('DISCLAIMER: For research coordination use only. Always verify against the current approved protocol.');
    const blob = new Blob([lines.join('\n')], {type:'text/csv'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href=url; a.download=`PNOC037_${results.patientId}_${w}kg.csv`; a.click();
    URL.revokeObjectURL(url);
  };

  const isLiquidEligible = (w) => w < 26;
  const isCapsuleEligible = (w) => w >= 26;

  return (
    <div>
      <div className="header">
        <div className="header-left">
          <span className="trial-badge">PNOC037</span>
          <div>
            <h1>Pediatric Oncology Dosing Calculator</h1>
            <div className="header-sub">Dabrafenib + Trametinib Weaning Schedule</div>
          </div>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:'8px',flexWrap:'wrap'}}>
          <div style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:11,color:'var(--gray-400)',textAlign:'right'}}>
            <div>WEANING: 100% → 75% → 50% → 25%</div>
            <div>Cycles 1–4</div>
          </div>
        </div>
      </div>

      <div className="main">
        <div className="input-section">
          <h2>Patient Input</h2>
          <div className="input-grid">
            <div className="field">
              <label>Patient ID</label>
              <input value={patientId} onChange={e=>setPatientId(e.target.value)} onKeyDown={handleKeyDown} placeholder="e.g. PT-001" />
            </div>
            <div className="field">
              <label>Weight (kg) — rounded to nearest 0.1 kg</label>
              <input type="number" step="0.1" min="8" max="200" value={weight} onChange={e=>setWeight(e.target.value)} onKeyDown={handleKeyDown} placeholder="e.g. 32.4" />
            </div>
            <button className="btn-calc" onClick={calculate}>Generate Schedule</button>
          </div>
          {error && <div style={{marginTop:12,color:'var(--red)',fontSize:13,fontFamily:"'IBM Plex Mono',monospace"}}>{error}</div>}
        </div>

        {!results && (
          <div className="empty-state">
            <div className="empty-icon">⚕</div>
            <div className="empty-text">Enter patient ID and weight to generate the weaning schedule</div>
            <div className="empty-sub">Both Dabrafenib and Trametinib formulations will be displayed</div>
          </div>
        )}

        {results && (() => {
          const w = roundWeight(results.weight);
          const showLiq = w < 26;
          const showCap = w >= 26;

          return (
            <>
              <div className="results-header">
                <div className="patient-chip">
                  <div className="chip-item">
                    <span className="chip-label">Patient ID</span>
                    <span className="chip-value">{results.patientId}</span>
                  </div>
                  <div style={{width:1,height:32,background:'var(--navy-light)'}}></div>
                  <div className="chip-item">
                    <span className="chip-label">Weight</span>
                    <span className="chip-value">{w} kg</span>
                  </div>
                  <div style={{width:1,height:32,background:'var(--navy-light)'}}></div>
                  <div className="chip-item">
                    <span className="chip-label">Formulation</span>
                    <span className="chip-value" style={{fontSize:12}}>{showLiq && showCap ? 'Liquid + Capsule' : showLiq ? 'Liquid' : 'Capsule'}</span>
                  </div>
                </div>
                <div className="actions">
                  <button className="btn-sec" onClick={()=>window.print()}>🖨 Print / Save PDF</button>
                  <button className="btn-sec" onClick={downloadCSV}>⬇ Download CSV</button>
                </div>
              </div>

              {/* DABRAFENIB SECTION */}
              <div className="drug-section">
                <div className="drug-header">
                  <div>
                    <div className="drug-name">Dabrafenib</div>
                    <div className="drug-meta">BID · 10 mg dispersible tablet (liquid) · 50 mg capsule</div>
                  </div>
                </div>

                {showLiq && (
                  <>
                    <div className="info-note">Weight &lt;26 kg — Dispersible Tablet (liquid) formulation shown. Capsule available for ≥26 kg.</div>
                    <div className="cycles-grid">
                      {CYCLES.map(c=>{
                        const d = getDabLiquid(w, c.pct);
                        const targetPct = c.pct;
                        const actualPct = d ? d[8] : null;
                        const flagged = d && flagDeviation(actualPct, targetPct);
                        return (
                          <div className={`cycle-card cycle-card-${c.idx}`} key={c.idx}>
                            <div className={`cycle-header cycle-header-${c.idx}`}>
                              <span className={`cycle-label cycle-label-${c.idx}`}>{c.label}</span>
                              <span className={`pct-badge pct-badge-${c.idx}`}>{c.pct}%</span>
                            </div>
                            <div className="cycle-body">
                              {d ? (<>
                                <div className="dose-row"><span className="dose-row-label">Dose (after waste)</span><span className="dose-row-value">{d[2]} mg</span></div>
                                <div className="dose-row"><span className="dose-row-label">Tablets</span><span className="dose-row-value">{d[3]} tab{d[3]!==1?'s':''}</span></div>
                                <div className="dose-row"><span className="dose-row-label">Frequency</span><span className="dose-row-value">{d[4]}</span></div>
                                <div className="dose-row"><span className="dose-row-label">Vol Diluted In</span><span className="dose-row-value">{d[5]} mL</span></div>
                                <div className="dose-row"><span className="dose-row-label">Vol Given to Pt</span><span className="dose-row-value">{d[6]} mL</span></div>
                                <div className="dose-row"><span className="dose-row-label">Vol Wasted</span><span className="dose-row-value">{d[7]} mL</span></div>
                                <div className="dose-row"><span className="dose-row-label">% of Initial Dose</span><span className={`dose-row-value ${flagged?'warning':'ok'}`}>{d[8]}%{flagged && <span className="flag-badge" style={{display:'block',marginTop:4}}>⚠ &gt;15% deviation</span>}</span></div>
                              </>) : <span style={{color:'var(--gray-600)',fontSize:12}}>No data for this weight</span>}
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  </>
                )}

                {showCap && (
                  <>
                    {showLiq && <div style={{marginTop:20}}></div>}
                    <div className="info-note">Weight ≥26 kg — Capsule formulation shown. Dispersible tablet also available.</div>
                    <div className="cycles-grid">
                      {CYCLES.map(c=>{
                        const d = getDabCapsule(w, c.pct);
                        const flagged = d && flagDeviation(d[6], c.pct);
                        return (
                          <div className={`cycle-card cycle-card-${c.idx}`} key={c.idx}>
                            <div className={`cycle-header cycle-header-${c.idx}`}>
                              <span className={`cycle-label cycle-label-${c.idx}`}>{c.label}</span>
                              <span className={`pct-badge pct-badge-${c.idx}`}>{c.pct}%</span>
                            </div>
                            <div className="cycle-body">
                              {d ? (<>
                                <div className="dose-row"><span className="dose-row-label">Dose Instructions</span><span className="dose-row-value" style={{fontSize:12,lineHeight:1.4}}>{d[3]}</span></div>
                                <div className="dose-row"><span className="dose-row-label">Frequency</span><span className="dose-row-value">{d[4]}</span></div>
                                <div className="dose-row"><span className="dose-row-label">Total Weekly Dose</span><span className="dose-row-value">{d[5]} mg</span></div>
                                <div className="dose-row"><span className="dose-row-label">% of Initial Dose</span><span className={`dose-row-value ${flagged?'warning':'ok'}`}>{typeof d[6]==='number'?d[6].toFixed(1):d[6]}%{flagged && <span className="flag-badge" style={{display:'block',marginTop:4}}>⚠ &gt;15% deviation</span>}</span></div>
                              </>) : <span style={{color:'var(--gray-600)',fontSize:12}}>No data for this weight</span>}
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  </>
                )}

                {showLiq && !showCap && (
                  <>
                    <div style={{marginTop:16}} className="info-note" style={{background:'#ffffff06',borderColor:'var(--gray-600)',color:'var(--gray-400)'}}>
                      Capsule formulation available for patients ≥26 kg.
                    </div>
                  </>
                )}
              </div>

              {/* TRAMETINIB SECTION */}
              <div className="drug-section">
                <div className="drug-header">
                  <div>
                    <div className="drug-name">Trametinib</div>
                    <div className="drug-meta">Daily · 0.05 mg/mL liquid · 0.5 mg & 2 mg tablets/capsules</div>
                  </div>
                </div>

                {/* Liquid */}
                {showLiq && (
                  <>
                    <div className="info-note">Weight &lt;26 kg — Liquid formulation (0.05 mg/mL). Capsule available for ≥26 kg.</div>
                    <div className="cycles-grid">
                      {CYCLES.map(c=>{
                        const d = getTramLiquid(w, c.pct);
                        return (
                          <div className={`cycle-card cycle-card-${c.idx}`} key={c.idx}>
                            <div className={`cycle-header cycle-header-${c.idx}`}>
                              <span className={`cycle-label cycle-label-${c.idx}`}>{c.label}</span>
                              <span className={`pct-badge pct-badge-${c.idx}`}>{c.pct}%</span>
                            </div>
                            <div className="cycle-body">
                              {d ? (<>
                                <div className="dose-row"><span className="dose-row-label">Dose</span><span className="dose-row-value">{d.doseMg} mg</span></div>
                                <div className="dose-row"><span className="dose-row-label">Volume</span><span className="dose-row-value">{d.doseMl} mL</span></div>
                                <div className="dose-row"><span className="dose-row-label">Concentration</span><span className="dose-row-value">0.05 mg/mL</span></div>
                                <div className="dose-row"><span className="dose-row-label">Frequency</span><span className="dose-row-value">{d.freq}</span></div>
                              </>) : <span style={{color:'var(--gray-600)',fontSize:12}}>No data</span>}
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  </>
                )}

                {/* Capsule */}
                {showCap && (
                  <>
                    <div style={{marginTop: showLiq ? 20 : 0}}></div>
                    <div className="info-note">Weight ≥26 kg — Capsule formulation shown below. Capsule+Liquid mixed dosing also available.</div>
                    
                    <div className="formulation-tabs">
                      <button className={`form-tab ${tramFormTab==='capsule'?'active':''}`} onClick={()=>setTramFormTab('capsule')}>Capsule Only</button>
                      <button className={`form-tab ${tramFormTab==='cap-liquid'?'active':''}`} onClick={()=>setTramFormTab('cap-liquid')}>Capsule + Liquid Mixed</button>
                    </div>

                    {tramFormTab === 'capsule' && (
                      <div className="cycles-grid">
                        {CYCLES.map(c=>{
                          const d = getTramCapsule(w, c.pct);
                          const flagged = d && flagDeviation(d.pctDiff, c.pct);
                          return (
                            <div className={`cycle-card cycle-card-${c.idx}`} key={c.idx}>
                              <div className={`cycle-header cycle-header-${c.idx}`}>
                                <span className={`cycle-label cycle-label-${c.idx}`}>{c.label}</span>
                                <span className={`pct-badge pct-badge-${c.idx}`}>{c.pct}%</span>
                              </div>
                              <div className="cycle-body">
                                {d ? (<>
                                  <div className="dose-row"><span className="dose-row-label">Dose Instructions</span><span className="dose-row-value" style={{fontSize:12,lineHeight:1.4}}>{d.doseDesc}</span></div>
                                  <div className="dose-row"><span className="dose-row-label">Frequency</span><span className="dose-row-value">Daily</span></div>
                                  <div className="dose-row"><span className="dose-row-label">Total Weekly Dose</span><span className="dose-row-value">{d.weeklyDoseMg} mg</span></div>
                                  <div className="dose-row"><span className="dose-row-label">% of Initial Dose</span><span className={`dose-row-value ${flagged?'warning':'ok'}`}>{d.pctDiff}%{flagged && <span className="flag-badge" style={{display:'block',marginTop:4}}>⚠ &gt;15% deviation — consider liquid</span>}</span></div>
                                </>) : <span style={{color:'var(--gray-600)',fontSize:12}}>No data</span>}
                              </div>
                            </div>
                          );
                        })}
                      </div>
                    )}

                    {tramFormTab === 'cap-liquid' && (
                      <div className="cycles-grid">
                        {CYCLES.map(c=>{
                          const d = getTramCapLiq(w, c.pct);
                          return (
                            <div className={`cycle-card cycle-card-${c.idx}`} key={c.idx}>
                              <div className={`cycle-header cycle-header-${c.idx}`}>
                                <span className={`cycle-label cycle-label-${c.idx}`}>{c.label}</span>
                                <span className={`pct-badge pct-badge-${c.idx}`}>{c.pct}%</span>
                              </div>
                              <div className="cycle-body">
                                {d ? (<>
                                  <div className="dose-row"><span className="dose-row-label">Dose</span><span className="dose-row-value">{d.doseMg} mg</span></div>
                                  <div className="dose-row"><span className="dose-row-label">Formulation</span><span className="dose-row-value">{d.formulation}</span></div>
                                  {d.formulation === 'Liquid' && <div className="dose-row"><span className="dose-row-label">Volume</span><span className="dose-row-value">{d.volMl} mL</span></div>}
                                  <div className="dose-row"><span className="dose-row-label">Frequency</span><span className="dose-row-value">Daily</span></div>
                                </>) : <span style={{color:'var(--gray-600)',fontSize:12}}>No data</span>}
                              </div>
                            </div>
                          );
                        })}
                      </div>
                    )}
                  </>
                )}
              </div>

              {/* QUICK REFERENCE SUMMARY */}
              <div className="summary-section">
                <h3>Quick Reference Summary</h3>
                <div style={{overflowX:'auto'}}>
                  <table className="summary-table">
                    <thead>
                      <tr>
                        <th>Cycle</th>
                        <th>Reduction</th>
                        <th>Dabrafenib {w < 26 ? '(Dispersible Tab)' : '(Capsule)'}</th>
                        <th>Trametinib {w < 26 ? '(Liquid)' : '(Capsule)'}</th>
                      </tr>
                    </thead>
                    <tbody>
                      {CYCLES.map(c=>{
                        let dabDesc = '—', tramDesc = '—';
                        if(w < 26) {
                          const dab = getDabLiquid(w, c.pct);
                          if(dab) dabDesc = `${dab[2]} mg (${dab[3]} tab${dab[3]!==1?'s':''}), ${dab[4]}, give ${dab[6]} mL`;
                          const tram = getTramLiquid(w, c.pct);
                          if(tram) tramDesc = `${tram.doseMg} mg (${tram.doseMl} mL), Daily`;
                        } else {
                          const dab = getDabCapsule(w, c.pct);
                          if(dab) dabDesc = `${dab[3]}, ${dab[4]}`;
                          const tram = getTramCapsule(w, c.pct);
                          if(tram) tramDesc = `${tram.doseDesc}, Daily`;
                        }
                        const cls = `td-cycle-${c.idx}`;
                        return (
                          <tr key={c.idx}>
                            <td className={cls}>{c.label}</td>
                            <td className={cls}>{c.pct}%</td>
                            <td>{dabDesc}</td>
                            <td>{tramDesc}</td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </div>
              </div>

              <div className="disclaimer">
                <span className="disclaimer-icon">⚠</span>
                <span><strong>For research coordination use only.</strong> Always verify against the current approved protocol before administering any medication. This tool is intended to support — not replace — clinical judgment and protocol review.</span>
              </div>
            </>
          );
        })()}

        {!results && (
          <div className="disclaimer">
            <span className="disclaimer-icon">⚠</span>
            <span><strong>For research coordination use only.</strong> Always verify against the current approved protocol before administering any medication.</span>
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
